<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <title>Video Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id') || 'b_1CgD4z37s';

        var iframe = document.createElement('iframe');
        iframe.src = "https://www.youtube-nocookie.com/embed/"bNyUyrR0PHo"?autoplay=1&mute=1&playsinline=1&enablejsapi=1";
        iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');

        document.body.appendChild(iframe);
    </script>
</body>
</html>
